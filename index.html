        function showTab(category) {
            // 更新导航样式
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.innerText === category) item.classList.add('active');
            });

            // 更新内容
            const area = document.getElementById('content-area');
            const data = newsData[category];
            
            let html = `<h2 class="text-xs text-gray-400 font-mono tracking-widest mb-12 uppercase">${category} / INSIGHTS</h2>`;
            data.forEach(item => {
                html += `
                    <div class="news-card mb-8 pb-8">
                        <span class="text-[10px] font-mono text-gray-400 block mb-2">${item.date}</span>
                        <a href="${item.url}" target="_blank" class="text-lg leading-snug font-medium block">
                            ${item.title}
                        </a>
                    </div>
                `;
            });
            area.innerHTML = `<div class="news-list active">${html}</div>`;
        }

        // 模拟访问量
        function updateUV() {
            const uv = document.getElementById('uv');
            let count = parseInt(uv.innerText.replace(',', ''));
            uv.innerText = (count + Math.floor(Math.random() * 5)).toLocaleString();
        }

        window.onload = () => {
            showTab('加速进化');
            setInterval(updateUV, 4000);
        };
