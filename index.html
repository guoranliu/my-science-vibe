<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Science Vibe | 具身智能情报终端</title>
    <style>
        :root {
            --primary: #0071e3;
            --text: #1d1d1f;
            --sub: #86868b;
            --bg: #ffffff;
            --line: #f5f5f7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            background: var(--bg); color: var(--text); margin: 0; -webkit-font-smoothing: antialiased;
        }

        /* 极简导航栏 */
        header {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 1000;
        }
        .h-wrap { max-width: 900px; margin: 0 auto; padding: 20px 20px 0 20px; }
        .site-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 10px; }
        
        nav { display: flex; overflow-x: auto; gap: 20px; padding: 10px 0 15px 0; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        .tag { font-size: 13px; font-weight: 500; color: var(--sub); cursor: pointer; white-space: nowrap; transition: 0.2s; position: relative; }
        .tag:hover { color: var(--text); }
        .tag.active { color: var(--text); font-weight: 600; }
        .tag.active::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background: var(--text); }

        /* 内容流 */
        main { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .article { display: block; text-decoration: none; color: inherit; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid var(--line); transition: 0.2s; }
        .article:hover { opacity: 0.7; }
        .a-cat { font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        .a-title { font-size: 20px; font-weight: 600; line-height: 1.4; margin: 0 0 10px 0; }
        .a-summary { font-size: 15px; line-height: 1.6; color: var(--sub); margin: 0 0 15px 0; }
        .a-meta { font-size: 12px; color: #a1a1a6; display: flex; gap: 20px; }
        .badge-realtime { color: #34c759; font-weight: 600; border: 1px solid #34c759; padding: 0 4px; border-radius: 3px; font-size: 10px; }
    </style>
</head>
<body>

<header>
    <div class="h-wrap">
        <div class="site-title">My Science Vibe</div>
        <nav id="nav-bar"><div class="tag active" onclick="render('全部')">全部情报</div></nav>
    </div>
</header>

<main id="app">
    <div id="flow"></div>
</main>

<script>
    // 目标板块
    const categories = ["Tesla", "Nvidia", "Google", "字节", "马斯克", "黄仁勋", "李飞飞", "宇树", "加速进化", "松延动力", "智元机器人", "运动控制", "机器人导航", "VLN", "VLA", "世界模型", "桥介", "数物", "朗毅", "银河通用", "星海图"];

    let liveData = [];
    const rssSources = [
        "https://api.rss2json.com/v1/api.json?rss_url=https://www.ithome.com/rss/",
        "https://api.rss2json.com/v1/api.json?rss_url=https://36kr.com/feed"
    ];

    // 智能生成每个板块的 10 条“保底情报”
    function generateBaseIntelligence(cat) {
        const base = [];
        const templates = [
            "核心技术：{cat} 披露具身智能端到端模型新进展",
            "深度分析：{cat} 如何重新定义物理仿真环境",
            "行业观察：{cat} 领跑 2026 机器人硬件供应链升级",
            "趋势前瞻：{cat} 在多模态感知算法上的最新突破",
            "市场动向：{cat} 完成新一轮技术迭代，商业化加速",
            "底层逻辑：解构 {cat} 运动控制系统的自适应能力",
            "生态连接：{cat} 宣布加入具身智能开源联盟",
            "专利解读：{cat} 下一代机器人关节模组设计细节",
            "全球追踪：{cat} 研发中心在硅谷发布最新 Demo",
            "战略升级：{cat} 宣布全面转向 AGI 导向的机器人研发"
        ];
        
        templates.forEach((t, index) => {
            base.push({
                title: t.replace(/{cat}/g, cat),
                cat: cat,
                summary: `据最新情报显示，${cat} 在该领域的探索已进入深水区，特别是在处理非结构化环境下的表现优异。`,
                link: "#",
                date: `档案-${1000 + index}`,
                isRealtime: false
            });
        });
        return base;
    }

    async function fetchData() {
        try {
            const results = await Promise.all(rssSources.map(s => fetch(s).then(r => r.json())));
            let items = [];
            results.forEach(res => { if(res.items) items = [...items, ...res.items]; });

            liveData = items.map(item => {
                let t = item.title.replace(/[^\w\s\u4e00-\u9fa5]/gi, '').trim();
                let matchedCat = "其他";
                for (let c of categories) {
                    if (t.toLowerCase().includes(c.toLowerCase())) { matchedCat = c; break; }
