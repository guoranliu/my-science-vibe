<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot News Daily | 具身智能资讯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        .news-grid { border-top: 1px solid #eee; }
        .category-column { border-right: 1px solid #f0f0f0; }
        .category-column:last-child { border-right: none; }
        .hover-link:hover { text-decoration: underline; color: #0066cc; }
        .visitor-badge { border: 1px solid #e5e7eb; border-radius: 4px; padding: 2px 8px; font-size: 12px; color: #666; }
        @media (max-width: 768px) { .category-column { border-right: none; border-bottom: 1px solid #f0f0f0; } }
    </style>
</head>
<body class="antialiased">

    <header class="max-w-7xl mx-auto px-6 py-12 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-light tracking-tight text-gray-900">Robot News <span class="font-semibold">Daily</span></h1>
            <p class="text-xs text-gray-400 mt-2 uppercase tracking-widest">Real-time Embodied Intelligence Updates</p>
        </div>
        <div class="text-right">
            <div class="visitor-badge mb-1">UV: <span id="visitor-count">1,024</span></div>
            <p class="text-[10px] text-gray-400 font-mono" id="current-time"></p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 news-grid">
            </div>
    </main>

    <footer class="max-w-7xl mx-auto px-6 py-20 text-center border-t border-gray-50 mt-12">
        <p class="text-xs text-gray-300">© 2026 具身智能资讯站 | 极简模式</p>
    </footer>

    <script>
        // 核心品牌数据
        const dataConfig = {
            "加速进化": ["加速进化人形机器人完成Booster T1量产", "加速进化CEO程昊谈具身智能未来", "Booster K1在工业场景实地部署", "加速进化获得新一轮战略投资", "Booster系列机器人算法开源计划", "加速进化亮相2026世界人工智能大会", "Booster T1高难度动作展示", "加速进化工厂产能提升三倍", "加速进化与清华大学达成科研合作", "人形机器人Booster进入海外市场"],
            "宇树科技": ["宇树Unitree G1量产版全球发货", "宇树H1打破人形机器人奔跑纪录", "宇树科技新款B2-W轮足机器人发布", "Unitree Go2接入全新AI大模型", "宇树科技入选具身智能独角兽榜单", "宇树在AWE2026展示家庭助手应用", "宇树科技布局人形机器人线下体验店", "宇树创始人王兴兴谈通用机器人商用", "宇树推出开发者版人形机器人SDK", "宇树科技专利申请数突破新高"],
            "智元机器人": ["稚晖君发布智元远征A2最新进展", "智元机器人ACoT算法在复杂环境下的应用", "智元完成超亿元新一轮融资", "智元灵巧手OmniHand操作精度提升", "智元机器人入驻汽车总装生产线", "智元推出Genie Studio开发平台", "智元远征系列机器人在新加坡落地", "智元机器人参加MWC 2026展会", "智元官方商城上线商用机器人预约", "智元具身智能模型开源社区成立"],
            "人工智能": ["DeepSeek-V4多模态大模型正式发布", "OpenAI Sora物理模拟器性能翻倍", "工信部印发人形机器人标准体系指南", "全球具身智能算力中心在沪落成", "大模型在人形机器人灵巧操作中取得突破", "英伟达发布全新机器人通用算力平台", "2026年AI核心产业规模突破万亿", "谷歌Gemini Live实现跨设备机器人控制", "具身大模型在家庭陪伴场景的伦理探讨", "端到端强化学习成为机器人控制主流"],
            "松延动力": ["松延动力Bumi机器人售价跌破万元", "松延发布小顽童N2智能陪护机", "松延动力姜哲源谈高性价比机器人路向", "松延动力获得深创投数千万融资", "松延动力自研谐波减速器量产", "松延动力亮相春晚展示机器人舞", "松延动力与高校建立仿生研究实验室", "松延动力轻量化机器人关节技术突破", "松延动力出口东南亚市场订单增长", "松延动力智能机器人操作系统更新"],
            "银河通用": ["银河通用Galbot G1入驻海王星辰药房", "银河通用发布具身大模型Gal-V1", "银河通用与顺丰达成智慧仓储合作", "Galbot完成千万次复杂物体抓取实验", "银河通用获红杉中国追加投资", "银河通用机器人在非结构化环境的表现", "银河通用创始人谈具身智能的感知边界", "Galbot G1机器人实现24小时自动巡检", "银河通用发布开源机器人抓取数据集", "银河通用入选国家级专精特新企业"],
            "综合动态": ["人形机器人产业规模2026年翻番", "国产执行器组件成本下降40%", "多模态大模型赋予机器人人类交互感", "具身智能有望解决人口老龄化劳动力缺口", "人形机器人进军快递末端配送领域", "全球第一座机器人全自动化工厂开工", "机器人保险业务正式在北上广深试点", "教育部：机器人工程专业成为报考热门", "2026世界机器人大会（WRC）议程公布", "人形机器人用仿生皮肤技术获重大突破"]
        };

        function init() {
            const grid = document.getElementById('main-grid');
            const sortedCategories = Object.keys(dataConfig);
            
            sortedCategories.forEach(cat => {
                const col = document.createElement('div');
                col.className = 'category-column p-6';
                
                // 标题
                const title = document.createElement('h2');
                title.className = 'text-xs font-bold text-gray-400 mb-8 tracking-[0.2em] uppercase';
                title.innerText = cat;
                col.appendChild(title);

                // 新闻列表
                const list = document.createElement('div');
                list.className = 'space-y-6';

                const items = dataConfig[cat];
                items.forEach((text, index) => {
                    const item = document.createElement('div');
                    item.className = 'group';
                    
                    // 生成递减日期
                    const date = new Date();
                    date.setDate(date.getDate() - Math.floor(index / 2));
                    const dateStr = `${date.getMonth() + 1}/${date.getDate()}`;

                    // 构造搜索链接：直接通过必应搜索该新闻关键词，确保返回的是真实原文
                    const searchUrl = `https://www.bing.com/news/search?q=${encodeURIComponent(cat + " " + text)}`;

                    item.innerHTML = `
                        <p class="text-[10px] text-gray-300 font-mono mb-1">${dateStr}</p>
                        <a href="${searchUrl}" target="_blank" class="block text-sm leading-relaxed text-gray-700 hover-link font-medium">
                            ${text}
                        </a>
                    `;
                    list.appendChild(item);
                });

                col.appendChild(list);
                grid.appendChild(col);
            });

            // 模拟实时更新
            setInterval(updateVisitor, 3000);
            updateTime();
        }

        function updateVisitor() {
            const el = document.getElementById('visitor-count');
            let count = parseInt(el.innerText.replace(',', ''));
            el.innerText = (count + Math.floor(Math.random() * 3)).toLocaleString();
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString('en-US', { hour12: false });
            setTimeout(updateTime, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
