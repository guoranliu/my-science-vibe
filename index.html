<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Science Vibe | 机器人与 AI 导航</title>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
        }

        /* 头部：包含总访问量和板块导航 */
        header {
            background: #fff;
            padding: 1.5rem 0 0 0;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .site-title { margin: 0; font-size: 1.6rem; color: var(--primary); font-weight: 800; }
        
        .stats-bar { font-size: 0.75rem; color: var(--muted); margin: 8px 0; }

        /* 板块导航条：支持横向滚动 */
        nav {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 12px 20px;
            max-width: 100%;
            background: #fff;
            scrollbar-width: none; /* Firefox 隐藏滚动条 */
        }
        nav::-webkit-scrollbar { display: none; } /* Chrome 隐藏滚动条 */

        .nav-tag {
            padding: 6px 14px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            color: var(--text);
            flex-shrink: 0; /* 防止挤压 */
        }

        .nav-tag:hover { background: #e2e8f0; }
        .nav-tag.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 内容区 */
        main {
            max-width: 800px;
            margin: 1.5rem auto;
            padding: 0 1rem;
