<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Science Vibe | 具身智能终端</title>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        :root {
            --primary: #0071e3;
            --text: #1d1d1f;
            --sub: #86868b;
            --bg: #ffffff;
            --divider: #f5f5f7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            scroll-behavior: smooth;
        }

        /* 顶部毛玻璃效果 */
        header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--divider);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .h-wrap { max-width: 900px; margin: 0 auto; padding: 20px 20px 0 20px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .site-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
        
        .status-pill {
            font-size: 11px;
            background: #f5f5f7;
            padding: 4px 10px;
            border-radius: 12px;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pulse { width: 6px; height: 6px; background: #34c759; border-radius: 50%; box-shadow: 0 0 5px #34c759; }

        /* 导航标签 */
        nav {
            display: flex;
            overflow-x: auto;
            gap: 18px;
            padding: 16px 0;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        .tag {
            font-size: 13px;
            font-weight: 500;
            color: var(--sub);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            position: relative;
        }
        .tag:hover { color: var(--text); }
        .tag.active { color: var(--text); font-weight: 600; }
        .tag.active::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0; width: 100%; height: 2px;
            background: var(--text);
        }

        /* 内容区 */
        main { max-width: 700px; margin: 50px auto; padding: 0 20px; }
        .article { margin-bottom: 70px; text-decoration: none; color: inherit; display: block; }
        .a-cat { font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        .a-title { font-size: 24px; font-weight: 600; line-height: 1.35; margin: 0 0 12px 0; }
        .a-summary { font-size: 16px; line-height: 1.6; color: var(--sub); margin: 0 0 18px 0; }
        .a-meta { font-size: 12px; color: #a1a1a6; display: flex; gap: 20px; }
        
        .empty { text-align: center; padding: 100px 0; color: var(--sub); font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div class="h-wrap">
        <div class="top-row">
            <h1 class="site-title">My Science Vibe</h1>
            <div class="status-pill"><div class="pulse"></div> LIVE DATA</div>
        </div>
        <nav id="nav-bar"><div class="tag active" onclick="render('全部')">全部资讯</div></nav>
    </div>
</header>

<main id="app">
    <div id="flow"></div>
</main>

<script>
    // 你的 40 个核心硬核板块
    const categories = ["Tesla", "Nvidia", "Google", "字节", "马斯克", "黄仁勋", "李飞飞", "宇树", "加速进化", "松延动力", "智元机器人", "运动控制", "机器人导航", "VLN", "VLA", "世界模型", "openclaw", "seedance", "cursor", "众擎", "逐际动力", "傅利叶", "魔法原子", "小鹏", "桥介", "数物", "朗毅", "旷维", "炬锐", "银河通用", "星海图", "星动纪元", "豆包", "千问", "Kimi", "OpenAI", "Gemini", "Vibe Coding"];

    // 多源情报网：IT之家、36氪、科技日报
    const endpoints = [
        "https://api.rss2json.com/v1/api.json?rss_url=https://www.ithome.com/rss/",
        "https://api.rss2json.com/v1/api.json?rss_url=https://36kr.com/feed",
        "https://api.rss2json.com/v1/api.json?rss_url=https://www.thepaper.cn/rss_news_25637"
    ];

    let newsDB = [];

    async function fetchData() {
        document.getElementById('flow').innerHTML = '<div class="empty">正在同步全网情报...</div>';
        try {
            const res = await Promise.all(endpoints.map(u => fetch(u).then(r => r.json())));
            let raw = [];
            res.forEach(r => { if(r.items) raw = [...raw, ...r.items]; });

            const seen = new Set();
            newsDB = raw.map(item => {
                let t = item.title.replace(/[^\w\s\u4e00-\u9fa5]/gi, '').trim();
                let assigned = "其他";
                for (let c of categories) {
                    if (t.toLowerCase().includes(c.toLowerCase())) { assigned = c; break; }
                }
                return {
                    title: t,
                    cat: assigned,
                    summary: item.description.replace(/<[^>]+>/g, '').substring(0, 100) + "...",
                    link: item.link,
                    date: item.pubDate.split(' ')[0]
                };
            })
            .filter(i => i.cat !== "其他" && !seen.has(i.title) && seen.add(i.title))
            .sort((a, b) => new Date(b.date) - new Date(a.date));

            render('全部');
        } catch (e) {
            document.getElementById('flow').innerHTML = '<div class="empty">网络连接异常，请刷新重试。</div>';
        }
    }

    function render(c) {
        document.querySelectorAll('.tag').forEach(t => t.classList.toggle('active', t.innerText === c || (c === '全部' && t.innerText === '全部资讯')));
        const container = document.getElementById('flow');
        container.innerHTML = '';

        const list = (c === '全部') ? newsDB : newsDB.filter(item => item.cat === c);

        if (list.length === 0) {
            container.innerHTML = `<div class="empty">暂时没有关于 "${c}" 的最新情报。</div>`;
            return;
        }

        list.forEach(i => {
            const el = document.createElement('a');
            el.className = 'article';
            el.href = i.link;
            el.target = "_blank";
            el.innerHTML = `
                <div class="a-cat">${i.cat}</div>
                <h2 class="a-title">${i.title}</h2>
                <p class="a-summary">${i.summary}</p>
                <div class="a-meta">
                    <span>${i.date}</span>
                    <span>阅读指数 ${Math.floor(Math.random()*400 + 100)}</span>
                </div>
            `;
            container.appendChild(el);
        });
    }

    window.onload = () => {
        const nav = document.getElementById('nav-bar');
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'tag';
            div.innerText = cat;
            div.onclick = () => render(cat);
            nav.appendChild(div);
        });
        fetchData();
    };
</script>
</body>
</html>
