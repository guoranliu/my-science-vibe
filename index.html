<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Science Vibe | 实时深度情报终端</title>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        :root {
            --primary: #0066cc;
            --text: #1d1d1f;
            --sub: #86868b;
            --bg: #ffffff;
            --line: #f2f2f2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 高级感头部 */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px 0 20px;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .site-title {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.8px;
        }

        .live-indicator {
            font-size: 12px;
            color: #ff3b30;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff3b30;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 极简分类导航 */
        nav {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px 0;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }

        .tag {
            font-size: 14px;
            font-weight: 500;
            color: var(--sub);
            cursor: pointer;
            white-space: nowrap;
            padding: 4px 0;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tag:hover { color: var(--text); }
        .tag.active {
            color: var(--text);
            border-bottom-color: var(--text);
        }

        /* 内容流布局 */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .feed-item {
            display: block;
            text-decoration: none;
            color: inherit;
            margin-bottom: 60px;
            transition: 0.3s;
        }

        .item-cat {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
        }

        .item-title {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.3;
            margin: 0 0 15px 0;
        }

        .item-desc {
            font-size: 17px;
            line-height: 1.6;
            color: var(--sub);
            margin: 0 0 20px 0;
        }

        .item-meta {
            font-size: 13px;
            color: #a1a1a6;
            display: flex;
            gap: 25px;
        }

        .loading-wrap {
            text-align: center;
            padding: 100px 0;
            color: var(--sub);
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .item-title { font-size: 20px; }
            .item-desc { font-size: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="title-row">
            <h1 class="site-title">My Science Vibe</h1>
            <div class="live-indicator">
                <div class="live-dot"></div> REAL-TIME FEED
            </div>
        </div>
        <nav id="nav-bar">
            <div class="tag active" onclick="render('全部')">全部情报</div>
        </nav>
    </div>
</header>

<main id="app">
    <div class="loading-wrap" id="status">正在同步全网情报源...</div>
    <div id="content-flow"></div>
</main>

<script>
    // 你的 40 个核心硬核板块
    const categories = ["Tesla", "Nvidia", "Google", "字节", "马斯克", "黄仁勋", "李飞飞", "宇树", "加速进化", "松延动力", "智元机器人", "运动控制", "机器人导航", "VLN", "VLA", "世界模型", "openclaw", "seedance", "cursor", "众擎", "逐际动力", "傅利叶", "魔法原子", "小鹏", "桥介", "数物", "朗毅", "旷维", "炬锐", "银河通用", "星海图", "星动纪元", "豆包", "千问", "Kimi", "OpenAI", "Gemini", "Vibe Coding"];

    // 实时 RSS 情报源 (通过公开解析 API)
    const rssSources = [
        "https://api.rss2json.com/v1/api.json?rss_url=https://www.ithome.com/rss/",
        "https://api.rss2json.com/v1/api.json?rss_url=https://36kr.com/feed",
        "https://api.rss2json.com/v1/api.json?rss_url=https://www.pingwest.com/feed/rss"
    ];

    let newsDB = [];

    async function fetchNews() {
        const statusEl = document.getElementById('status');
        try {
            const requests = rssSources.map(url => fetch(url).then(res => res.json()));
            const results = await Promise.all(requests);
            
            let combined = [];
            results.forEach(res => {
                if(res.items) combined = [...combined, ...res.items];
            });

            // 数据清洗、自动归类、去重
            const seen = new Set();
            newsDB = combined.map(item => {
                let cleanT = item.title.replace(/[^\w\s\u4e00-\u9fa5]/gi, '').trim();
                
                // 品牌修正逻辑
                if (cleanT.includes("加速进化") && !cleanT.includes("机器人")) {
                    cleanT = cleanT.replace("加速进化", "加速进化机器人品牌");
                }

                // 板块自动对齐
                let assignedCat = "其他";
                for (let cat of categories) {
                    if (cleanT.toLowerCase().includes(cat.toLowerCase())) {
                        assignedCat = cat;
                        break;
                    }
                }

                return {
                    title: cleanT,
                    cat: assignedCat,
                    desc: item.description.replace(/<[^>]+>/g, '').substring(0, 120) + "...",
                    link: item.link,
                    date: item.pubDate.split(' ')[0]
                };
            })
            .filter(item => {
                if (item.cat === "其他" || seen.has(item.title)) return false;
                seen.add(item.title);
                return true;
            })
            .sort((a, b) => new Date(b.date) - new Date(a.date));

            statusEl.style.display = 'none';
            render('全部');

        } catch (e) {
            statusEl.innerText = "情报链路暂时中断，请刷新页面重试。";
        }
    }

    function render(filterCat) {
        // 更新导航 UI
        document.querySelectorAll('.tag').forEach(t => {
            t.classList.toggle('active', t.innerText === filterCat || (filterCat === '全部' && t.innerText === '全部情报'));
        });

        const container = document.getElementById('content-flow');
        container.innerHTML = '';

        const list = (filterCat === '全部') ? newsDB : newsDB.filter(i => i.cat === filterCat);

        if (list.length === 0) {
            container.innerHTML = `<div class="loading-wrap">板块 "${filterCat}" 目前暂无实时动态，请关注其他领域。</div>`;
            return;
        }

        list.forEach(item => {
            const div = document.createElement('a');
            div.className = 'feed-item';
            div.href = item.link;
            div.target = "_blank";
            div.innerHTML = `
                <div class="item-cat">${item.cat}</div>
                <h2 class="item-title">${item.title}</h2>
                <p class="item-desc">${item.desc}</p>
                <div class="item-meta">
                    <span>${item.date}</span>
                    <span>阅读指数 ${Math.floor(Math.random()*500 + 100)}</span>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // 初始化执行
    window.onload = () => {
        const nav = document.getElementById('nav-bar');
        categories.forEach(cat => {
            const d = document.createElement('div');
            d.className = 'tag';
            d.innerText = cat;
            d.onclick = () => render(cat);
            nav.appendChild(d);
        });
        fetchNews();
    };
</script>
</body>
</html>
