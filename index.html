<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Humanoid Live - 实时具身智能资讯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #3b82f6; }
        body { background: #050505; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(15, 15, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .live-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .news-entry { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 2px solid transparent; }
        .news-entry:hover { border-left-color: var(--accent); background: rgba(59, 130, 246, 0.05); padding-left: 1rem; }
        .new-badge { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 glass border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-red-500 rounded-full live-dot"></div>
                <h1 class="text-xl font-bold tracking-tighter italic">ROBO-LIVE <span class="text-blue-500">2026</span></h1>
            </div>
            <div class="flex gap-6 text-sm font-mono">
                <div class="text-slate-400">STATUS: <span class="text-green-500">REAL-TIME</span></div>
                <div class="text-slate-400">TODAY VIEWS: <span id="v-count" class="text-white font-bold">--</span></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="board" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        const categories = ["加速进化", "智元机器人", "宇树科技", "松延动力", "银河通用", "人工智能"];
        
        // 基础新闻池（模拟实时抓取的数据库）
        const rawPool = {
            "加速进化": ["Booster T1完成工厂实地压力测试", "加速进化宣布开源其B1系列关节电机控制算法", "发布Booster Mini：面向教育市场的桌面级人形机", "CEO程昊受邀参加2026全球具身智能峰会"],
            "智元机器人": ["稚晖君展示ACoT大模型在复杂厨电操作中的应用", "智元A2系列正式进入汽车总装线", "灵巧手OmniHand 2代发布：支持触觉反馈", "智元获评2025年度最具价值AI硬科技企业"],
            "宇树科技": ["Unitree G1量产版正式发货", "宇树发布新款四足机器人B2-W：集成轮足复合移动", "宇树H1在全地形跑步测试中刷新纪录", "京东与宇树达成战略合作，推进末端配送自动化"],
            "松延动力": ["松延动力Bumi机器人完成百万次无故障行走", "发布小顽童N2：首款具备情感交互的人形宠物机", "松延动力获得由深创投领投的C轮融资", "自研高扭矩密度执行器实现量产"],
            "银河通用": ["Galbot G1入驻北京海王星辰药店", "银河通用发布具身大模型Gal-V1", "Galbot完成在非结构化环境下的复杂物体抓取", "银河通用与顺丰签署无人仓储物流协议"],
            "人工智能": ["DeepSeek-V4 发布：参数量突破3万亿", "OpenAI Sora 2.0 开放物理模拟接口", "工信部发布《2026人形机器人产业链白皮书》", "全球首例AI机器人独立完成微创手术"]
        };

        const container = document.getElementById('board');

        // 初始化板块
        function initBoard() {
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'glass rounded-xl p-5 flex flex-col h-[500px]';
                div.innerHTML = `
                    <h2 class="text-lg font-bold mb-4 flex justify-between items-center">
                        ${cat}
                        <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded">STREAMING</span>
                    </h2>
                    <div id="list-${cat}" class="space-y-4 overflow-y-auto pr-2 custom-scroll flex-grow"></div>
                `;
                container.appendChild(div);
                // 初始填充10条
                for(let i=0; i<10; i++) addNews(cat, true);
            });
        }

        // 添加新闻函数
        function addNews(cat, isInitial = false) {
            const list = document.getElementById(`list-${cat}`);
            const pool = rawPool[cat] || rawPool["人工智能"];
            const randomText = pool[Math.floor(Math.random() * pool.length)];
            
            // 模拟日期
            const now = new Date();
            if (!isInitial) now.setMinutes(now.getMinutes() - Math.floor(Math.random() * 60));
            const dateStr = `${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

            const item = document.createElement('div');
            item.className = `news-entry pb-3 border-b border-white/5 cursor-pointer ${!isInitial ? 'new-badge' : ''}`;
            item.innerHTML = `
                <div class="text-[10px] text-slate-500 mb-1 font-mono">${dateStr}</div>
                <a href="#" class="text-sm text-slate-300 hover:text-blue-400 leading-snug block">${randomText} - 实时快讯 #${Math.floor(Math.random()*999)}</a>
            `;

            if (isInitial) {
                list.appendChild(item);
            } else {
                list.insertBefore(item, list.firstChild);
                if (list.children.length > 15) list.removeChild(list.lastChild);
            }
        }

        // 模拟访问量
        function updateViews() {
            let count = parseInt(localStorage.getItem('viewCount') || '15420');
            count += Math.floor(Math.random() * 5);
            localStorage.setItem('viewCount', count);
            document.getElementById('v-count').innerText = count.toLocaleString();
        }

        // 启动实时轮询
        initBoard();
        updateViews();
        
        // 每 3-8 秒随机给一个板块推新
        setInterval(() => {
            const randomCat = categories[Math.floor(Math.random() * categories.length)];
            addNews(randomCat);
            updateViews();
        }, 4000);

    </script>
</body>
</html>
